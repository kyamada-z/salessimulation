<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派遣売上シミュレーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root">
        <div class="flex items-center justify-center h-screen text-slate-400">アプリを起動中...</div>
    </div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ComposedChart, Line, Legend } = Recharts;

        function App() {
            const [p, setP] = useState({ 
                initialUsers: 530, 
                price: 280000, 
                churn: 0.055, 
                newUsers: 33, 
                months: 12 
            });

            const data = useMemo(() => {
                let monthlyData = [];
                let currentUsers = p.initialUsers;
                for (let i = 1; i <= p.months; i++) {
                    currentUsers = (currentUsers + p.newUsers) * (1 - p.churn);
                    monthlyData.push({
                        name: `${i}ヶ月`,
                        稼働数: Math.round(currentUsers),
                        売上: Math.round(currentUsers * p.price)
                    });
                }
                return monthlyData;
            }, [p]);

            const formatYAxis = (tickItem) => {
                return tickItem >= 10000 ? (tickItem / 10000) + '万' : tickItem;
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10 space-y-6 text-slate-800">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h1 class="text-2xl font-bold flex items-center gap-2">📊 派遣売上シミュレーション</h1>
                        <p class="text-sm text-slate-400 mt-1">GitHub Pages 正式公開版</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                            <h2 class="font-bold border-b pb-2">条件設定</h2>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">初期人数 (人)</label>
                                <input type="number" value={p.initialUsers} onChange={e => setP({...p, initialUsers: Number(e.target.value)})} class="w-full p-2 bg-slate-50 border rounded-lg text-right font-mono" />
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">月間単価 (円)</label>
                                <input type="number" value={p.price} onChange={e => setP({...p, price: Number(e.target.value)})} class="w-full p-2 bg-slate-50 border rounded-lg text-right font-mono" />
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">退職率 (%)</label>
                                <input type="number" value={p.churn * 100} step="0.1" onChange={e => setP({...p, churn: Number(e.target.value)/100})} class="w-full p-2 bg-slate-50 border rounded-lg text-right font-mono" />
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">月間新規数 (人)</label>
                                <input type="number" value={p.newUsers} onChange={e => setP({...p, newUsers: Number(e.target.value)})} class="w-full p-2 bg-slate-50 border rounded-lg text-right font-mono" />
                            </div>
                        </div>

                        <div className="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 class="font-bold mb-6 text-center">稼働数と売上の推移</h2>
                            <div className="h-80 w-full">
                                <ResponsiveContainer>
                                    <ComposedChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                        <XAxis dataKey="name" tick={{fontSize: 11}} />
                                        <YAxis yAxisId="left" tickFormatter={formatYAxis} tick={{fontSize: 11}} />
                                        <YAxis yAxisId="right" orientation="right" tick={{fontSize: 11}} />
                                        <Tooltip />
                                        <Legend />
                                        <Bar yAxisId="left" dataKey="売上" fill="#3b82f6" radius={[4, 4, 0, 0]} name="予測売上(円)" />
                                        <Line yAxisId="right" type="monotone" dataKey="稼働数" stroke="#f43f5e" strokeWidth={3} name="稼働人数(人)" />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
