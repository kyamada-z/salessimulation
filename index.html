<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派遣売上シミュレーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-xl font-bold text-slate-800 mb-6 text-center">📊 派遣売上シミュレーター</h1>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">現在の稼働数 (人)</label>
                <input type="number" id="users" value="530" class="w-full p-2 border rounded-lg bg-slate-50 font-mono text-right" oninput="calc()">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">月間退職率 (%)</label>
                <input type="number" id="churn" value="5.5" step="0.1" class="w-full p-2 border rounded-lg bg-slate-50 font-mono text-right" oninput="calc()">
            </div>
        </div>

        <div class="bg-blue-600 p-6 rounded-xl text-white text-center shadow-inner">
            <p class="text-sm opacity-80 mb-1">3ヶ月後の予想稼働数</p>
            <p class="text-4xl font-black" id="result">---</p>
        </div>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400">※この画面が表示されていれば、GitHub Pagesの設定は完璧です！</p>
        </div>
    </div>

    <script>
        function calc() {
            const users = Number(document.getElementById('users').value);
            const churn = Number(document.getElementById('churn').value) / 100;
            
            // 簡易計算（3ヶ月間、新規なしで退職のみ考慮）
            let current = users;
            for(let i=0; i<3; i++) {
                current = current * (1 - churn);
            }
            
            document.getElementById('result').innerText = Math.round(current) + " 人";
        }
        // 起動時に一度実行
        window.onload = calc;
    </script>
</body>
</html>
