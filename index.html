<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>派遣売上シミュレーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body>
    <div id="root">表示を準備しています...</div>

    <script type="text/babel">
        const { useState } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        function App() {
            const [users, setUsers] = useState(530);
            const data = [
                { name: '現在', value: users },
                { name: '1ヶ月後', value: Math.round(users * 0.95 + 30) },
                { name: '2ヶ月後', value: Math.round((users * 0.95 + 30) * 0.95 + 30) },
            ];

            return (
                <div className="p-10 text-center">
                    <h1 className="text-2xl font-bold mb-5">売上予測シミュレーター</h1>
                    <div className="bg-white p-5 shadow-lg rounded-lg border inline-block w-full max-w-md">
                        <div className="h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <CartesianGrid strokeDasharray="3 3" />
                                    <XAxis dataKey="name" />
                                    <YAxis />
                                    <Tooltip />
                                    <Bar dataKey="value" fill="#3b82f6" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        <p className="mt-4 text-blue-600 font-bold">アプリは正常に動作しています！</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
